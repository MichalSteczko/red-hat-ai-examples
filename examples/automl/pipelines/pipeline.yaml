pipelineInfo:
  description: 'End-to-end AutoGluon tabular training pipeline implementing a two-stage
    approach: first builds and selects top-performing models on sampled data, then
    refits them on the full dataset. The pipeline loads data from S3, splits it into
    train/test sets, trains multiple AutoGluon models using ensembling (stacking and
    bagging), selects the top N performers, refits each on the complete training data
    in parallel, and finally evaluates all refitted models to generate a comprehensive
    leaderboard with performance metrics.'
  name: autogluon-tabular-training-pipeline
root:
  dag:
    tasks:
      automl-data-loader:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-automl-data-loader
        inputs:
          parameters:
            bucket_name:
              componentInputParameter: train_data_bucket_name
            file_key:
              componentInputParameter: train_data_file_key
            label_column:
              componentInputParameter: label_column
            task_type:
              componentInputParameter: task_type
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: automl-data-loader
      for-loop-1:
        componentRef:
          name: comp-for-loop-1
        dependentTasks:
        - automl-data-loader
        - models-selection
        inputs:
          artifacts:
            pipelinechannel--automl-data-loader-sampled_test_dataset:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: automl-data-loader
          parameters:
            pipelinechannel--automl-data-loader-extra_train_data_path:
              taskOutputParameter:
                outputParameterKey: extra_train_data_path
                producerTask: automl-data-loader
            pipelinechannel--automl-data-loader-sample_config:
              taskOutputParameter:
                outputParameterKey: sample_config
                producerTask: automl-data-loader
            pipelinechannel--automl-data-loader-sample_row:
              taskOutputParameter:
                outputParameterKey: sample_row
                producerTask: automl-data-loader
            pipelinechannel--automl-data-loader-split_config:
              taskOutputParameter:
                outputParameterKey: split_config
                producerTask: automl-data-loader
            pipelinechannel--models-selection-model_config:
              taskOutputParameter:
                outputParameterKey: model_config
                producerTask: models-selection
            pipelinechannel--models-selection-predictor_path:
              taskOutputParameter:
                outputParameterKey: predictor_path
                producerTask: models-selection
            pipelinechannel--models-selection-top_models:
              taskOutputParameter:
                outputParameterKey: top_models
                producerTask: models-selection
        iteratorPolicy:
          parallelismLimit: 2
        parameterIterator:
          itemInput: pipelinechannel--models-selection-top_models-loop-item
          items:
            inputParameter: pipelinechannel--models-selection-top_models
        taskInfo:
          name: for-loop-1
      leaderboard-evaluation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-leaderboard-evaluation
        dependentTasks:
        - for-loop-1
        - models-selection
        inputs:
          artifacts:
            models:
              taskOutputArtifact:
                outputArtifactKey: pipelinechannel--autogluon-models-full-refit-model_artifact
                producerTask: for-loop-1
          parameters:
            eval_metric:
              taskOutputParameter:
                outputParameterKey: eval_metric
                producerTask: models-selection
        taskInfo:
          name: leaderboard-evaluation
      models-selection:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-models-selection
        dependentTasks:
        - automl-data-loader
        inputs:
          artifacts:
            test_data:
              taskOutputArtifact:
                outputArtifactKey: sampled_test_dataset
                producerTask: automl-data-loader
          parameters:
            label_column:
              componentInputParameter: label_column
            task_type:
              componentInputParameter: task_type
            top_n:
              componentInputParameter: top_n
            train_data_path:
              taskOutputParameter:
                outputParameterKey: models_selection_train_data_path
                producerTask: automl-data-loader
            workspace_path:
              runtimeValue:
                constant: '{{$.workspace_path}}'
        taskInfo:
          name: models-selection
  inputDefinitions:
    parameters:
      label_column:
        description: Name of the target/label column in the dataset.
        parameterType: STRING
      task_type:
        description: '"binary", "multiclass", or "regression"; drives metrics and
          model types.'
        parameterType: STRING
      top_n:
        defaultValue: 3.0
        description: 'Number of top models to select and refit (default: 3); positive
          integer.'
        isOptional: true
        parameterType: NUMBER_INTEGER
      train_data_bucket_name:
        description: S3-compatible bucket name containing the tabular data file.
        parameterType: STRING
      train_data_file_key:
        description: S3 object key of the CSV file (features and target column).
        parameterType: STRING
      train_data_secret_name:
        description: Kubernetes secret name with S3 credentials (AWS_ACCESS_KEY_ID,
          AWS_SECRET_ACCESS_KEY, AWS_S3_ENDPOINT, AWS_DEFAULT_REGION).
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-automl-data-loader:
