apiVersion: llamastack.io/v1alpha1
kind: LlamaStackDistribution
metadata:
  name: llama-stack
spec:
  replicas: 1
  server:
    containerSpec:
      resources:
        requests:
          cpu: "250m"
          memory: "500Mi"
        limits:
          cpu: 1
          memory: "2Gi"
      env:
        - name: FMS_ORCHESTRATOR_URL
          value: "http://localhost"
      name: llama-stack
      port: 8321
    distribution:
      image: ${env.LLAMA_STACK_IMAGE:=quay.io/opendatahub/llama-stack}
    storage:
      size: 5Gi
    userConfig:
      configMapName: llama-stack-config